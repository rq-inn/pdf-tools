<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#254f72">
  <title>PDFpakka 1.0</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="./images/icon-192.png">
  <link rel="apple-touch-icon" href="./images/icon-192.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="unsupportedScreen" class="unsupported-screen" hidden>
    <p>iOS / Android : Not supported</p>
  </div>

  <div id="appRoot" class="app-shell" hidden>
    <main class="app-card">
      <header class="hero">
        <div class="brand-mark" aria-hidden="true">
          <img src="./images/icon-512.png" alt="">
        </div>
        <div class="title-block">
          <h1 id="appTitle">PDFpakka 1.0</h1>
          <p id="heroDescription" class="hero-description">Join left and right PDFs in alternating order, then download the merged file in your browser.</p>
        </div>
        <section id="languageArea" class="language-panel" aria-label="Language"></section>
      </header>

      <section class="panel panel-intro">
        <div class="intro-copy">
          <p id="workflowEyebrow" class="eyebrow">Workflow</p>
          <p id="workflowText" class="intro-text">Select left PDFs and right PDFs, then run the existing merge workflow.</p>
        </div>
        <section id="modeArea" class="mode-panel"></section>
      </section>

      <section id="controlArea" class="panel controls-panel">
        <div id="pdfInputArea" class="pdf-input-area">
          <div id="pdfLeftArea" class="pdf-side"></div>
          <div id="pdfRightArea" class="pdf-side"></div>
        </div>
      </section>

      <section class="info-grid">
        <section id="statusArea" class="panel info-block"></section>
        <section id="progressArea" class="panel info-block"></section>
      </section>

      <nav id="backArea" class="back-link-bar"></nav>
    </main>

    <a
      class="footer-logo-link"
      href="https://www.rq-inn.com/"
      target="_blank"
      rel="noreferrer"
      aria-label="rq-inn"
    >
      <img src="../20260330_PDFコンビニUSBv2/images/rq-inn-logo.png" alt="rq-inn">
    </a>
  </div>

  <footer id="osNotice" class="os-notice hidden"></footer>

  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="./js/select_language.js"></script>
  <script src="./js/select_file_folder.js"></script>
  <script src="./js/folder_output.js"></script>
  <script src="./js/join_logic.js"></script>
  <script src="./js/os_detect.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
