<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#7d4a21">
  <meta name="application-name" content="RuneQuest PDF Hub">
  <title>RuneQuest PDF Hub</title>
  <link rel="icon" type="image/png" sizes="192x192" href="./images/icon-192.png">
  <link rel="apple-touch-icon" href="./images/icon-192.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
  <script>
    (function () {
      var ua = navigator.userAgent || "";
      var touchCapable = navigator.maxTouchPoints > 1;
      var isSmallScreen = window.matchMedia && window.matchMedia("(max-width: 820px)").matches;
      var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(ua) || (touchCapable && isSmallScreen);
      document.documentElement.dataset.mobile = isMobile ? "true" : "false";
    }());
  </script>
</head>
<body>
  <div id="unsupported-screen" class="unsupported-screen" hidden>
    <p>This app is not supported on iOS or Android.</p>
  </div>

  <div id="app-root" class="app-shell" hidden>
    <main class="hub-card">
      <header class="hero">
        <div class="brand-mark" aria-hidden="true">
          <img src="./images/icon-512.png" alt="">
        </div>
        <div class="title-block">
          <p id="app-kicker" class="app-kicker"></p>
          <h1 id="app-title"></h1>
          <p id="app-description-line-1" class="hero-description"></p>
          <p id="app-description-line-2" class="hero-description"></p>
        </div>
        <label class="language-panel" for="language-select">
          <span id="language-label"></span>
          <select id="language-select" aria-label="Language"></select>
        </label>
      </header>

      <section class="card-grid" id="launcher-grid"></section>
    </main>

    <a
      class="footer-logo-link"
      href="https://www.rq-inn.com/"
      target="_blank"
      rel="noreferrer"
      aria-label="rq-inn"
    >
      <img src="./20260330_PDFコンビニUSBv2/images/rq-inn-logo.png" alt="rq-inn">
    </a>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
